        <h1>TenderMaster AI — Government Tender Analysis &amp; Annexure Filling for Indian Bidders</h1>
        <p>Upload a tender. Know in 60 seconds whether to bid. Get every annexure filled and submission-ready. Never lose track of your EMD again.</p>
        <p>TenderMaster AI reads Indian government tender documents, checks eligibility against your business profile, and fills every required annexure — GeM, CPPP, nProcure and more. Available in English, Hindi and Gujarati.</p>
        <h2>How it works</h2>
        <ol>
          <li><strong>Upload the tender</strong> — PDF, ZIP, or a GeM / CPPP link</li>
          <li><strong>AI analyses against your business profile</strong> — eligibility, compliance, financials, risk, win probability and deadlines</li>
          <li><strong>Get a decision and the paperwork</strong> — bid recommendation plus every annexure filled and submission-ready</li>
        </ol>
        <h2>Key features</h2>
        <ul>
          <li>Tender analysis — match score, eligibility and compliance matrix</li>
          <li>Auto-fill annexures — the exact form the department issued, completed with your business data</li>
          <li>EMD and Security Deposit tracker — Paid → Pending Refund → Refunded</li>
          <li>Tender chat — plain-language answers from the document</li>
          <li>Deadline notifications — submission and pre-bid dates extracted automatically</li>
          <li>Business profile — statutory details filled once, reused across all tenders</li>
        </ul>
        <h2>Pricing</h2>
